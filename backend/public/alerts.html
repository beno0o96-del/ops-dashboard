<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الإنذارات</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="js/api-client.js?v=20260308_alerts"></script>
    <script src="admin.js?v=20260308_alerts"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .btn { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 8px; transition: all 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn-secondary { background: #64748b; }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: #1e293b; margin: 5% auto; padding: 20px; border: 1px solid #334155; border-radius: 12px; width: 90%; max-width: 600px; }
        .attachment-item { background: #2d3748; border: 1px solid #4a5568; border-radius: 8px; padding: 12px; margin: 8px 0; }
        .attachment-preview { max-width: 100px; max-height: 100px; border-radius: 4px; }
    </style>
</head>
<body class="p-4">
    <div class="container mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-white" data-ar="إدارة الإنذارات" data-en="Alerts Management">إدارة الإنذارات</h1>
            <div class="flex items-center gap-2">
                <button class="btn btn-secondary" onclick="setLang('ar')">AR</button>
                <button class="btn btn-secondary" onclick="setLang('en')">EN</button>
                <button class="btn btn-primary" onclick="openAlertModal()" data-en="New Alert" data-ar="إنذار جديد">
                    <i class="fas fa-plus mr-2"></i>إنذار جديد
                </button>
            </div>
        </div>

        <!-- Alerts Table -->
        <div class="card p-4 mb-6">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-slate-600">
                            <th class="p-2 text-right" data-ar="العنوان" data-en="Title">العنوان</th>
                            <th class="p-2 text-right" data-ar="النوع" data-en="Type">النوع</th>
                            <th class="p-2 text-right" data-ar="الأولوية" data-en="Priority">الأولوية</th>
                            <th class="p-2 text-right" data-ar="الحالة" data-en="Status">الحالة</th>
                            <th class="p-2 text-right" data-ar="الفرع" data-en="Branch">الفرع</th>
                            <th class="p-2 text-right" data-ar="الإجراءات" data-en="Actions">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="alerts-table-body">
                        <tr>
                            <td colspan="6" class="p-4 text-center text-slate-400" data-ar="جاري تحميل الإنذارات..." data-en="Loading alerts...">جاري تحميل الإنذارات...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Alert Modal -->
        <div id="alertModal" class="modal">
            <div class="modal-content">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold" id="alertModalTitle" data-ar="إنذار جديد" data-en="New Alert">إنذار جديد</h2>
                    <button onclick="closeAlertModal()" class="text-slate-400 hover:text-white">&times;</button>
                </div>
                
                <form id="alertForm" onsubmit="saveAlert(event)">
                    <input type="hidden" id="alertId">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-slate-300 mb-2" data-ar="العنوان" data-en="Title">العنوان</label>
                            <input type="text" id="alertTitle" required class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-white">
                        </div>
                        
                        <div>
                            <label class="block text-slate-300 mb-2" data-ar="النوع" data-en="Type">النوع</label>
                            <select id="alertType" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-white">
                                <option value="warning" data-ar="تحذير" data-en="Warning">تحذير</option>
                                <option value="error" data-ar="خطأ" data-en="Error">خطأ</option>
                                <option value="info" data-ar="معلومات" data-en="Info">معلومات</option>
                                <option value="success" data-ar="نجاح" data-en="Success">نجاح</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-slate-300 mb-2" data-ar="الأولوية" data-en="Priority">الأولوية</label>
                            <select id="alertPriority" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-white">
                                <option value="low" data-ar="منخفضة" data-en="Low">منخفضة</option>
                                <option value="medium" data-ar="متوسطة" data-en="Medium">متوسطة</option>
                                <option value="high" data-ar="عالية" data-en="High">عالية</option>
                                <option value="critical" data-ar="حرجة" data-en="Critical">حرجة</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-slate-300 mb-2" data-ar="الحالة" data-en="Status">الحالة</label>
                            <select id="alertStatus" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-white">
                                <option value="open" data-ar="مفتوحة" data-en="Open">مفتوحة</option>
                                <option value="in_progress" data-ar="قيد المعالجة" data-en="In Progress">قيد المعالجة</option>
                                <option value="resolved" data-ar="تم الحل" data-en="Resolved">تم الحل</option>
                                <option value="closed" data-ar="مغلقة" data-en="Closed">مغلقة</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-slate-300 mb-2" data-ar="الفرع" data-en="Branch">الفرع</label>
                            <select id="alertBranch" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-white">
                                <option value="" data-ar="اختر الفرع" data-en="Select Branch">اختر الفرع</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-slate-300 mb-2" data-ar="مركز التكلفة" data-en="Cost Center">مركز التكلفة</label>
                            <input type="text" id="alertCostCenter" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-white">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-slate-300 mb-2" data-ar="الوصف" data-en="Description">الوصف</label>
                        <textarea id="alertDescription" rows="3" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-white"></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-slate-300 mb-2" data-ar="تاريخ الاستحقاق" data-en="Due Date">تاريخ الاستحقاق</label>
                        <input type="date" id="alertDueDate" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-white">
                    </div>
                    
                    <!-- Attachments Section -->
                    <div class="mb-4">
                        <label class="block text-slate-300 mb-2" data-ar="المرفقات" data-en="Attachments">المرفقات</label>
                        <div class="border border-slate-600 rounded p-3">
                            <div class="flex items-center gap-2 mb-3">
                                <input type="file" id="alertFiles" multiple class="hidden" onchange="handleAlertFilesSelected(this.files)">
                                <button type="button" onclick="document.getElementById('alertFiles').click()" class="btn btn-secondary" data-ar="إضافة ملفات" data-en="Add Files">
                                    <i class="fas fa-paperclip mr-2"></i>إضافة ملفات
                                </button>
                                <span class="text-slate-400 text-sm" data-ar="اسحب وأفلت الملفات هنا" data-en="Drag and drop files here">اسحب وأفلت الملفات هنا</span>
                            </div>
                            
                            <div id="alertPendingAttachments" class="space-y-2">
                                <!-- Pending attachments will be rendered here -->
                            </div>
                            
                            <div id="alertSavedAttachments" class="space-y-2 mt-4">
                                <!-- Saved attachments will be rendered here -->
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-end gap-2">
                        <button type="button" onclick="closeAlertModal()" class="btn btn-secondary" data-ar="إلغاء" data-en="Cancel">إلغاء</button>
                        <button type="submit" class="btn btn-primary" data-ar="حفظ" data-en="Save">حفظ</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- View Attachments Modal -->
        <div id="viewAttachmentsModal" class="modal">
            <div class="modal-content">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold" data-ar="مرفقات الإنذار" data-en="Alert Attachments">مرفقات الإنذار</h2>
                    <button onclick="closeViewAttachmentsModal()" class="text-slate-400 hover:text-white">&times;</button>
                </div>
                
                <div id="alertAttachmentsList" class="space-y-2">
                    <!-- Attachments will be rendered here -->
                </div>
                
                <div class="flex justify-end mt-4">
                    <button onclick="closeViewAttachmentsModal()" class="btn btn-secondary" data-ar="إغلاق" data-en="Close">إغلاق</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Global variables
        let __alerts = [];
        let __alertEditingId = null;
        let __alertPendingAttachments = [];
        function getLang() {
            return (window.App && typeof App.getLang === 'function') ? App.getLang() : (localStorage.getItem('lang') || 'ar');
        }
        function setLang(lang) {
            if (window.App && typeof App.setLang === 'function') App.setLang(lang);
            else localStorage.setItem('lang', lang);
            document.documentElement.lang = getLang();
            document.documentElement.dir = getLang() === 'ar' ? 'rtl' : 'ltr';
            renderAlertsTable();
            loadBranches();
        }
        function tr(ar, en) {
            return getLang() === 'ar' ? ar : en;
        }

        // Load alerts on page load
        document.addEventListener('DOMContentLoaded', function() {
            if (window.App && typeof App.init === 'function') App.init('alerts');
            document.documentElement.lang = getLang();
            document.documentElement.dir = getLang() === 'ar' ? 'rtl' : 'ltr';
            loadAlerts();
            loadBranches();
        });
        document.addEventListener('app:lang', function(){
            document.documentElement.lang = getLang();
            document.documentElement.dir = getLang() === 'ar' ? 'rtl' : 'ltr';
            renderAlertsTable();
            loadBranches();
        });

        // Load alerts from API
        async function loadAlerts() {
            try {
                const response = await apiClient.get('/alerts');
                __alerts = response.data || [];
                renderAlertsTable();
            } catch (error) {
                console.error('Error loading alerts:', error);
                alert('فشل في تحميل الإنذارات');
            }
        }

        // Load branches for dropdown
        async function loadBranches() {
            try {
                const response = await apiClient.get('/branches');
                const branches = response.data || [];
                const select = document.getElementById('alertBranch');
                
                branches.forEach(branch => {
                    const option = document.createElement('option');
                    option.value = branch.id;
                    option.textContent = getLang() === 'ar' ? (branch.name_ar || branch.name || branch.name_en || '-') : (branch.name_en || branch.name || branch.name_ar || '-');
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading branches:', error);
            }
        }

        // Render alerts table
        function renderAlertsTable() {
            const tbody = document.getElementById('alerts-table-body');
            
            if (__alerts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-500" data-ar="لا توجد إنذارات" data-en="No alerts found">لا توجد إنذارات</td></tr>';
                return;
            }

            tbody.innerHTML = __alerts.map(alert => `
                <tr class="border-b border-slate-700 hover:bg-slate-800">
                    <td class="p-2">${alert.title || '-'}</td>
                    <td class="p-2">${getAlertTypeLabel(alert.type)}</td>
                    <td class="p-2">${getPriorityLabel(alert.priority)}</td>
                    <td class="p-2">${getStatusLabel(alert.status)}</td>
                    <td class="p-2">${alert.branch?.name_ar || alert.branch?.name || '-'}</td>
                    <td class="p-2">
                        <div class="flex gap-2">
                            <button onclick="editAlert(${alert.id})" class="btn btn-secondary text-xs" data-ar="تعديل" data-en="Edit">تعديل</button>
                            <button onclick="viewAlertAttachments(${alert.id})" class="btn btn-secondary text-xs" data-ar="المرفقات" data-en="Attachments">المرفقات</button>
                            <button onclick="deleteAlert(${alert.id})" class="btn btn-danger text-xs" data-ar="حذف" data-en="Delete">حذف</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Helper functions for labels
        function getAlertTypeLabel(type) {
            const labels = getLang() === 'ar' ? {
                'warning': 'تحذير',
                'error': 'خطأ',
                'info': 'معلومات',
                'success': 'نجاح'
            } : {
                'warning': 'Warning',
                'error': 'Error',
                'info': 'Info',
                'success': 'Success'
            };
            return labels[type] || type;
        }

        function getPriorityLabel(priority) {
            const labels = getLang() === 'ar' ? {
                'low': 'منخفضة',
                'medium': 'متوسطة',
                'high': 'عالية',
                'critical': 'حرجة'
            } : {
                'low': 'Low',
                'medium': 'Medium',
                'high': 'High',
                'critical': 'Critical'
            };
            return labels[priority] || priority;
        }

        function getStatusLabel(status) {
            const labels = getLang() === 'ar' ? {
                'open': 'مفتوحة',
                'in_progress': 'قيد المعالجة',
                'resolved': 'تم الحل',
                'closed': 'مغلقة'
            } : {
                'open': 'Open',
                'in_progress': 'In Progress',
                'resolved': 'Resolved',
                'closed': 'Closed'
            };
            return labels[status] || status;
        }

        // Modal functions
        function openAlertModal(alertId = null) {
            __alertEditingId = alertId;
            const modal = document.getElementById('alertModal');
            const title = document.getElementById('alertModalTitle');
            
            if (alertId) {
                title.textContent = tr('تعديل الإنذار', 'Edit Alert');
                loadAlertData(alertId);
            } else {
                title.textContent = tr('إنذار جديد', 'New Alert');
                document.getElementById('alertForm').reset();
                __alertPendingAttachments = [];
                renderAlertPendingAttachments();
                renderAlertSavedAttachments([]);
            }
            
            modal.style.display = 'block';
        }

        function closeAlertModal() {
            document.getElementById('alertModal').style.display = 'none';
            __alertEditingId = null;
            __alertPendingAttachments = [];
        }

        function closeViewAttachmentsModal() {
            document.getElementById('viewAttachmentsModal').style.display = 'none';
        }

        // Load alert data for editing
        async function loadAlertData(alertId) {
            try {
                const response = await apiClient.get(`/alerts/${alertId}`);
                const alert = response.data;
                
                document.getElementById('alertId').value = alert.id;
                document.getElementById('alertTitle').value = alert.title || '';
                document.getElementById('alertType').value = alert.type || 'warning';
                document.getElementById('alertPriority').value = alert.priority || 'medium';
                document.getElementById('alertStatus').value = alert.status || 'open';
                document.getElementById('alertBranch').value = alert.branch_id || '';
                document.getElementById('alertCostCenter').value = alert.cost_center || '';
                document.getElementById('alertDescription').value = alert.description || '';
                document.getElementById('alertDueDate').value = alert.due_date ? alert.due_date.split('T')[0] : '';
                
                // Load attachments
                renderAlertSavedAttachments(alert.attachments || []);
                __alertPendingAttachments = [];
                renderAlertPendingAttachments();
                
            } catch (error) {
                console.error('Error loading alert:', error);
                alert(tr('فشل في تحميل بيانات الإنذار', 'Failed to load alert data'));
            }
        }

        // Save alert
        async function saveAlert(event) {
            event.preventDefault();
            
            const formData = new FormData();
            formData.append('title', document.getElementById('alertTitle').value);
            formData.append('type', document.getElementById('alertType').value);
            formData.append('priority', document.getElementById('alertPriority').value);
            formData.append('status', document.getElementById('alertStatus').value);
            formData.append('branch_id', document.getElementById('alertBranch').value);
            formData.append('cost_center', document.getElementById('alertCostCenter').value);
            formData.append('description', document.getElementById('alertDescription').value);
            formData.append('due_date', document.getElementById('alertDueDate').value);
            
            try {
                let response;
                
                if (__alertEditingId) {
                    response = await apiClient.put(`/alerts/${__alertEditingId}`, formData);
                } else {
                    response = await apiClient.post('/alerts', formData);
                }
                
                const savedAlert = response.data;
                
                // Upload pending attachments
                if (__alertPendingAttachments.length > 0) {
                    await uploadAlertAttachments(savedAlert.id);
                }
                
                alert(tr('تم حفظ الإنذار بنجاح', 'Alert saved successfully'));
                closeAlertModal();
                loadAlerts();
                
            } catch (error) {
                console.error('Error saving alert:', error);
                alert(tr('فشل في حفظ الإنذار', 'Failed to save alert'));
            }
        }

        // Upload alert attachments
        async function uploadAlertAttachments(alertId) {
            for (const attachment of __alertPendingAttachments) {
                if (attachment.file) {
                    const formData = new FormData();
                    formData.append('file', attachment.file);
                    formData.append('cost_center', document.getElementById('alertCostCenter').value);
                    
                    try {
                        await apiClient.post(`/alerts/${alertId}/attachments`, formData);
                    } catch (error) {
                        console.error('Error uploading attachment:', error);
                    }
                }
            }
        }

        // Handle file selection
        function handleAlertFilesSelected(files) {
            const arr = Array.from(files || []);
            if (!arr.length) return;
            
            arr.forEach(file => {
                const id = 'att_' + Date.now() + '_' + Math.random().toString(16).slice(2);
                const item = {
                    id: id,
                    name: file.name,
                    type: file.type || '',
                    size: file.size || 0,
                    file: file,
                    previewUrl: '',
                    status: 'queued'
                };
                
                try { item.previewUrl = URL.createObjectURL(file); } catch(_) {}
                __alertPendingAttachments.push(item);
            });
            
            renderAlertPendingAttachments();
        }

        // Render pending attachments
        function renderAlertPendingAttachments() {
            const container = document.getElementById('alertPendingAttachments');
            
            if (__alertPendingAttachments.length === 0) {
                container.innerHTML = '<div class="text-slate-400 text-sm" data-ar="لا توجد مرفقات معلقة" data-en="No pending attachments">لا توجد مرفقات معلقة</div>';
                return;
            }
            
            container.innerHTML = __alertPendingAttachments.map(att => `
                <div class="attachment-item">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            ${att.previewUrl ? `<img src="${att.previewUrl}" class="attachment-preview" onerror="this.style.display='none'">` : ''}
                            <div>
                                <div class="text-sm font-medium">${att.name}</div>
                                <div class="text-xs text-slate-400">${formatFileSize(att.size)}</div>
                            </div>
                        </div>
                        <button onclick="removeAlertAttachment('${att.id}')" class="text-red-400 hover:text-red-300">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="text-xs text-slate-400 mt-1">
                        ${att.status === 'uploading' ? tr('جاري الرفع...', 'Uploading...') : tr('في انتظار الرفع', 'Waiting for upload')}
                    </div>
                </div>
            `).join('');
        }

        // Render saved attachments
        function renderAlertSavedAttachments(attachments) {
            const container = document.getElementById('alertSavedAttachments');
            
            if (attachments.length === 0) {
                container.innerHTML = '<div class="text-slate-400 text-sm" data-ar="لا توجد مرفقات محفوظة" data-en="No saved attachments">لا توجد مرفقات محفوظة</div>';
                return;
            }
            
            container.innerHTML = attachments.map(att => `
                <div class="attachment-item">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-paperclip text-slate-400"></i>
                            <div>
                                <div class="text-sm font-medium">${att.file_name}</div>
                                <div class="text-xs text-slate-400">${formatFileSize(att.size)}</div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <a href="${att.url}" target="_blank" class="text-blue-400 hover:text-blue-300" data-ar="عرض" data-en="View">عرض</a>
                            <button onclick="deleteAlertAttachment(${att.id}, ${att.attachable_id})" class="text-red-400 hover:text-red-300" data-ar="حذف" data-en="Delete">حذف</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Remove pending attachment
        function removeAlertAttachment(attachmentId) {
            __alertPendingAttachments = __alertPendingAttachments.filter(att => att.id !== attachmentId);
            renderAlertPendingAttachments();
        }

        // Delete saved attachment
        async function deleteAlertAttachment(attachmentId, alertId) {
            if (!confirm(tr('هل أنت متأكد من حذف هذا المرفق؟', 'Are you sure you want to delete this attachment?'))) return;
            
            try {
                await apiClient.delete(`/alerts/${alertId}/attachments/${attachmentId}`);
                alert(tr('تم حذف المرفق بنجاح', 'Attachment deleted successfully'));
                loadAlertData(alertId); // Reload alert data to refresh attachments
            } catch (error) {
                console.error('Error deleting attachment:', error);
                alert(tr('فشل في حذف المرفق', 'Failed to delete attachment'));
            }
        }

        // View alert attachments
        async function viewAlertAttachments(alertId) {
            try {
                const response = await apiClient.get(`/alerts/${alertId}`);
                const alert = response.data;
                
                const container = document.getElementById('alertAttachmentsList');
                
                if (alert.attachments && alert.attachments.length > 0) {
                    container.innerHTML = alert.attachments.map(att => `
                        <div class="attachment-item">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <i class="fas fa-paperclip text-slate-400"></i>
                                    <div>
                                        <div class="text-sm font-medium">${att.file_name}</div>
                                        <div class="text-xs text-slate-400">${formatFileSize(att.size)} - ${new Date(att.created_at).toLocaleDateString()}</div>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <a href="${att.url}" target="_blank" class="text-blue-400 hover:text-blue-300" data-ar="عرض" data-en="View">عرض</a>
                                    <a href="${att.url}" download class="text-green-400 hover:text-green-300" data-ar="تحميل" data-en="Download">تحميل</a>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="text-slate-400 text-center" data-ar="لا توجد مرفقات" data-en="No attachments">لا توجد مرفقات</div>';
                }
                
                document.getElementById('viewAttachmentsModal').style.display = 'block';
                
            } catch (error) {
                console.error('Error loading alert attachments:', error);
                alert(tr('فشل في تحميل المرفقات', 'Failed to load attachments'));
            }
        }

        // Delete alert
        async function deleteAlert(alertId) {
            if (!confirm(tr('هل أنت متأكد من حذف هذا الإنذار؟', 'Are you sure you want to delete this alert?'))) return;
            
            try {
                await apiClient.delete(`/alerts/${alertId}`);
                alert(tr('تم حذف الإنذار بنجاح', 'Alert deleted successfully'));
                loadAlerts();
            } catch (error) {
                console.error('Error deleting alert:', error);
                alert(tr('فشل في حذف الإنذار', 'Failed to delete alert'));
            }
        }

        // Edit alert
        function editAlert(alertId) {
            openAlertModal(alertId);
        }

        // Helper function to format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Drag and drop functionality
        const dropArea = document.querySelector('.border-slate-600.rounded');
        if (dropArea) {
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, preventDefaults, false);
            });
            
            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, highlight, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, unhighlight, false);
            });
            
            dropArea.addEventListener('drop', handleDrop, false);
        }

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function highlight() {
            dropArea.style.backgroundColor = '#374151';
        }

        function unhighlight() {
            dropArea.style.backgroundColor = '';
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleAlertFilesSelected(files);
        }
    </script>
</body>
</html>
