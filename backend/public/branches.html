  <script>
    // App.init('branches'); // Old init
    try { document.documentElement.style.visibility = ''; } catch(_){}
    
    // New API Init
    window.addEventListener('DOMContentLoaded', async () => {
        try { document.documentElement.style.visibility = ''; } catch(_){}
        try {
          var hasAuth = (sessionStorage.getItem('auth') === '1' || localStorage.getItem('auth') === '1');
          if (hasAuth && window.App && App.init) App.init('branches');
        } catch(_){}
        try {
          var apiRows = await fetchList('branches');
          console.log('DOMContentLoaded: fetchList result:', apiRows);
          
          if ((!Array.isArray(apiRows) || !apiRows.length) && typeof fetch === 'function') {
            console.log('DOMContentLoaded: جلب البيانات من API...');
            var res = await fetch('/api/branches', { headers: { 'Accept': 'application/json' } });
            console.log('DOMContentLoaded: API response status:', res.status);
            if (res.ok) {
              var json = await res.json();
              console.log('DOMContentLoaded: API response data:', json);
              apiRows = Array.isArray(json) ? json : (Array.isArray(json && json.data) ? json.data : (Array.isArray(json && json.data && json.data.data) ? json.data.data : []));
              console.log('DOMContentLoaded: معالجة البيانات من API:', apiRows.length, 'عنصر');
            } else {
              console.log('DOMContentLoaded: فشل جلب البيانات من API، الحالة:', res.status);
            }
          }
          
          console.log('DOMContentLoaded: البيانات النهائية:', apiRows);
          
          if (Array.isArray(apiRows) && apiRows.length) {
            console.log('DOMContentLoaded: حفظ البيانات في localStorage...');
            try { localStorage.setItem('admin_branches_data', JSON.stringify(apiRows)); } catch(_){}
            try { if (window.App && App.store && typeof App.store.set === 'function') App.store.set('branches', apiRows); } catch(_){}
          } else {
            console.log('DOMContentLoaded: لا توجد بيانات للحفظ');
          }
        } catch(e){
          console.error('DOMContentLoaded: خطأ في جلب البيانات:', e);
        }
        try { if(window.renderBranchesGridAPI) await window.renderBranchesGridAPI(); } catch(_){}
        try {
          if(document.getElementById('branches-table-body') && window.renderBranchesTableAPI) {
            await window.renderBranchesTableAPI();
          }
        } catch(_){}
        try { 
          console.log('DOMContentLoaded: بدء تحديث الأقسام...');
          buildRegionBar(); 
          console.log('DOMContentLoaded: تم تحديث شريط المناطق');
          renderOpenings(); 
          console.log('DOMContentLoaded: تم تحديث قسم الافتتاحات');
          renderGrid(); 
          console.log('DOMContentLoaded: تم تحديث قسم الفروع النشطة');
          renderClosed(); 
          console.log('DOMContentLoaded: تم تحديث قسم الفروع المغلقة');
        } catch(e){
          console.error('DOMContentLoaded: خطأ في تحديث الأقسام:', e);
        }
        try { setTimeout(function(){ ensureVisibleFallback(); }, 350); } catch(_){}
        
        // ✅ نظام المزامنة التلقائي مع لوحة التحكم
        setupAutoSync();
    });
    
    // ✅ نظام المزامنة المتقدم مع لوحة التحكم
    function setupAutoSync() {
        // استجابة لتغييرات البيانات من لوحة التحكم
        window.addEventListener('branchDataUpdated', function(e) {
            console.log('تم استلام حدث تحديث البيانات من لوحة التحكم:', e.detail);
            setTimeout(function() {
                console.log('إعادة تحميل الأقسام بعد تحديث البيانات...');
                buildRegionBar();
                renderOpenings();
                renderGrid();
                renderClosed();
            }, 100);
        });
        
        // استجابة لتغييرات المرفقات
        window.addEventListener('branchAttachmentsUpdated', function(e) {
            console.log('تم استلام حدث تحديث المرفقات:', e.detail);
            setTimeout(function() {
                console.log('تحديث عرض المرفقات...');
                // تحديث عدادات المرفقات في البطاقات
                updateAllAttachmentCounts();
            }, 100);
        });
        
        // فحص دوري للتحديثات (كل 30 ثانية)
        setInterval(function() {
            if (document.visibilityState === 'visible') {
                console.log('فحص دوري للتحديثات...');
                refreshBranchData();
            }
        }, 30000);
    }
    
    // ✅ تحديث جميع عدادات المرفقات
    function updateAllAttachmentCounts() {
        // تحديث عدادات الفروع النشطة
        var activeCards = document.querySelectorAll('#branches-grid [id^="attachments-count-"]');
        activeCards.forEach(function(el) {
            var branchId = el.id.replace('attachments-count-', '');
            updateAttachmentCount(branchId, el);
        });
        
        // تحديث عدادات الفروع المغلقة
        var closedCards = document.querySelectorAll('#closed-grid [id^="attachments-count-closed-"]');
        closedCards.forEach(function(el) {
            var branchId = el.id.replace('attachments-count-closed-', '');
            updateAttachmentCount(branchId, el);
        });
    }
    
    function getAllLocalAttachmentRows() {
        var rows = [];
        var seen = {};
        
        function addUniqueAttachments(newRows) {
            if (!Array.isArray(newRows)) return;
            newRows.forEach(function(att) {
                if (!att || typeof att !== 'object') return;
                var key = normalizeAttachmentKey(att);
                if (!key || seen[key]) return;
                seen[key] = true;
                rows.push(att);
            });
        }
        
        if (typeof Store !== 'undefined' && Store.list) {
            addUniqueAttachments(Store.list('attachments') || []);
            addUniqueAttachments(Store.list('branch_attachments') || []);
        }
        
        ['attachments', 'branch_attachments', 'admin_branch_attachments', 'db:attachments', 'db:branch_attachments'].forEach(function(k){
            var arr = safeParse(k, []);
            if (Array.isArray(arr)) {
                addUniqueAttachments(arr);
            } else if (arr && typeof arr === 'object' && k === 'db:branch_attachments') {
                Object.keys(arr).forEach(function(bid){
                    var list = Array.isArray(arr[bid]) ? arr[bid] : [];
                    addUniqueAttachments(list.map(function(att){
                        return Object.assign({}, att || {}, { __branch_id: String(bid || '').trim() });
                    }));
                });
            }
        });
        
        return rows;
    }

    function normalizeAttachmentKey(att) {
        var id = String(att && (att.id || att.attachment_id || '') || '').trim();
        var path = String(att && (att.file_path || att.path || att.url || att.file_url || att.storage_path || '') || '').trim();
        var name = String(att && (att.file_name || att.name || att.original_name || att.title || '') || '').trim();
        return id + '|' + path + '|' + name;
    }

    function isAttachmentDeleted(att) {
        if (!att || typeof att !== 'object') return false;
        if (att.deleted_at) return true;
        if (att.archived === true) return true;
        if (att.is_deleted === true) return true;
        if (String(att.status || '').trim().toLowerCase() === 'deleted') return true;
        if (String(att._deleted || '').trim().toLowerCase() === 'true') return true;
        return false;
    }

    function attachmentBelongsToBranch(att, branchId, costCenter, branchName) {
        var atype = String(att && (att.attachable_type || att.entity_type || att.owner_type || att.entity || '') || '').trim().toLowerCase();
        
        // السماح بمرفقات الفروع والمخالفات والأنواع الأخرى المرتبطة بالفرع
        var allowedTypes = ['branch', 'violation', 'employee', 'training', 'license', 'housing', 'transport'];
        if (atype && !allowedTypes.some(function(t) { return atype.indexOf(t) !== -1; })) return false;
        
        var bidLocal = String(att && (att.__branch_id || att.branch_key || '') || '').trim();
        var aid = String(att && (att.attachable_id || att.branch_id || att.branchId || att.entityId || '') || '').trim();
        var acc = String(att && (att.cost_center || att.costCenter || att.center || '') || '').trim();
        var anm = String(att && (att.branch || att.branch_name || att.location || '') || '').trim();
        
        if (bidLocal) return branchId && bidLocal === String(branchId);
        if (aid) return branchId && aid === String(branchId);
        if (anm) return branchName && anm === String(branchName);
        if (acc) return costCenter && acc === String(costCenter);
        return false;
    }

    function collectLocalAttachmentsForBranch(branchId, costCenter, branchName) {
        var rows = [];
        var branches = getStoreList('branches');
        if (!branches.length) branches = safeParse('admin_branches_data', []);
        rows = rows.concat(getAllLocalAttachmentRows().filter(function(att){
            return !isAttachmentDeleted(att) && attachmentBelongsToBranch(att, branchId, costCenter, branchName);
        }));
        var seen = {};
        return rows.filter(function(att){
            var key = normalizeAttachmentKey(att || {});
            if (!key || seen[key]) return false;
            seen[key] = true;
            return true;
        });
    }

    function paintAttachmentCount(element, count) {
        element.textContent = count + ' مرفق';
        element.className = 'truncate block ' + (count > 0 ? 'text-blue-400' : 'text-slate-400');
    }

    function updateAttachmentCount(branchId, element, branchObj) {
        if (!element) return;
        var branch = branchObj || null;
        if (!branch) {
            var branches = getStoreList('branches');
            if (!branches.length) branches = safeParse('admin_branches_data', []);
            branch = asArray(branches).find(function(b) {
                return String((b && (b.id || b.branch_id || b.code || ''))).trim() === String(branchId || '').trim();
            }) || null;
        }
        var resolvedBranchId = String((branch && (branch.id || branch.branch_id || branch.code || '')) || branchId || '').trim();
        var costCenter = String((branch && (branch.cost_center || branch.costCenter || branch.center || branch.cc || '')) || '').trim();
        var branchName = String((branch && (branch.name || branch.branch || branch.branch_name || '')) || '').trim();

        var localRows = collectLocalAttachmentsForBranch(resolvedBranchId, costCenter, branchName);
        paintAttachmentCount(element, localRows.length);

        if (typeof APIClient === 'undefined' || !APIClient.fetch) return;
        var calls = [];
        if (resolvedBranchId) {
            calls.push(APIClient.fetch('/api/branches/' + resolvedBranchId + '/attachments').catch(function(e) {
                console.warn('فشل جلب المرفقات من API للفرع', resolvedBranchId, e);
                return {success: false, data: []};
            }));
        } else if (costCenter) {
            calls.push(APIClient.fetch('/api/attachments/by-cost-center/' + encodeURIComponent(costCenter)).catch(function(e) {
                console.warn('فشل جلب المرفقات من API لمركز التكلفة', costCenter, e);
                return {success: false, data: []};
            }));
        }
        if (!calls.length) return;

        Promise.allSettled(calls).then(function(results){
            var merged = localRows.slice();
            results.forEach(function(r){
                if (r.status !== 'fulfilled') return;
                var payload = r.value;
            var rows = (payload && payload.success && Array.isArray(payload.data)) ? payload.data.filter(function(att){
                return !isAttachmentDeleted(att) && attachmentBelongsToBranch(att, resolvedBranchId, costCenter, branchName);
            }) : [];
                merged = merged.concat(rows);
            });
            var seen = {};
            var finalCount = merged.filter(function(att){
                if (isAttachmentDeleted(att)) return false;
                var key = normalizeAttachmentKey(att || {});
                if (!key || seen[key]) return false;
                seen[key] = true;
                return true;
            }).length;
            paintAttachmentCount(element, finalCount);
        }).catch(function(e){
            console.warn('فشل تحديث عداد المرفقات:', resolvedBranchId, e);
            paintAttachmentCount(element, localRows.length);
        });
    }
    
    // ✅ تحديث بيانات الفروع من الخادم
    function refreshBranchData() {
        if (typeof APIClient === 'undefined' || !APIClient.fetch) return;
        
        APIClient.fetch('/api/branches')
            .then(function(response) {
                if (response.success && response.data) {
                    // حفظ البيانات المحدثة
                    try { 
                        localStorage.setItem('admin_branches_data', JSON.stringify(response.data)); 
                    } catch(e) {
                        console.warn('فشل حفظ البيانات في localStorage:', e);
                    }
                    
                    try { 
                        if (window.App && App.store && typeof App.store.set === 'function') {
                            App.store.set('branches', response.data); 
                        }
                    } catch(e) {
                        console.warn('فشل حفظ البيانات في App.store:', e);
                    }
                    
                    // إعادة عرض الأقسام بالبيانات الجديدة
                    buildRegionBar();
                    renderOpenings();
                    renderGrid();
                    renderClosed();
                    
                    console.log('تم تحديث بيانات الفروع من الخادم');
                }
            })
            .catch(function(e) {
                console.warn('فشل تحديث بيانات الفروع:', e);
            });
    }

    function safeParse(k, d){ try{ return JSON.parse(localStorage.getItem(k)||JSON.stringify(d)); }catch(e){ return d; } }
    function asArray(v){ return Array.isArray(v) ? v.filter(function(x){ return x !== null && x !== undefined; }) : []; }
    function toNorm(v){ return String(v == null ? '' : v).trim().toLowerCase(); }
    function normalizeArabicDigits(v){
      var s = String(v == null ? '' : v);
      return s.replace(/[٠-٩]/g, function(d){ return String('٠١٢٣٤٥٦٧٨٩'.indexOf(d)); });
    }
    function normalizeLoose(v){
      return normalizeArabicDigits(v).replace(/\s+/g, ' ').trim().toLowerCase();
    }
    function normalizeCostCenter(v){
      return normalizeArabicDigits(v).replace(/\s+/g, '').replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
    }
    function pickFirstValue(obj, keys){
      if (!obj) return '';
      for (var i = 0; i < keys.length; i++) {
        var val = obj[keys[i]];
        if (val !== undefined && val !== null && String(val).trim() !== '') return String(val).trim();
      }
      return '';
    }
    function collectBranchesForLookup(){

          if (!b) return;
          var bid = normalizeLoose(b.id || b.branch_id || b.code || '');
          var bnm = normalizeLoose(b.name || b.branch || b.branch_name || '');
          var key = bid ? ('id:' + bid) : ('nm:' + bnm);
          if (!key || seen[key]) return;
          seen[key] = true;
          rows.push(b);
        });
      }
      push(getStoreList('branches'));
      push(safeParse('admin_branches_data', []));
      push(safeParse('db:branches', []));
      push(safeParse('branches', []));
      push(safeParse('ofs_branches_v1', []));
      return rows;
    }
    function resolveBranchByAnyRef(ref){
      var token = normalizeLoose(ref);

      for (var i = 0; i < rows.length; i++) {
        var b = rows[i] || {};
        var bid = normalizeLoose(b.id || b.branch_id || b.code || '');
        var bnm = normalizeLoose(b.name || b.branch || b.branch_name || '');
        var bcc = normalizeCostCenter(b.cost_center || b.costCenter || b.center || b.cc || '');
        if ((bid && bid === token) || (bnm && bnm === token) || (bcc && bcc === normalizeCostCenter(ref))) return b;
      }
      return null;
    }

      var recCc = normalizeCostCenter(extractRecordCostCenter(row));

    function collectBranchesFallback(){
      var merged = [];
      var seen = {};
      function pushRows(rows){
        asArray(rows).forEach(function(b){
          if (!b) return;
          var idKey = String((b.id || b.branch_id || b.code || '')).trim();
          var nmKey = String((b.name || b.branch || b.branch_name || b.code || '')).trim();
          var key = idKey ? ('id:' + idKey) : ('nm:' + nmKey);
          if (!nmKey || seen[key]) return;
          seen[key] = true;
          merged.push(b);
        });
      }
      pushRows(getStoreList('branches'));
      pushRows(safeParse('admin_branches_data', []));
      pushRows(safeParse('db:branches', []));
      pushRows(safeParse('branches', []));
      pushRows(safeParse('ofs_branches_v1', []));
      return merged;
    }
    async function ensureVisibleFallback(){
      var g1 = document.getElementById('openings-grid');

        try {
          var res = await fetch('/api/branches', { headers: { 'Accept': 'application/json' } });
          if (res.ok) {
            var json = await res.json();
            rows = asArray(Array.isArray(json) ? json : (Array.isArray(json && json.data) ? json.data : (Array.isArray(json && json.data && json.data.data) ? json.data.data : [])));
          }
        } catch(_){}
      }
      if (!rows.length) return;
      try { localStorage.setItem('admin_branches_data', JSON.stringify(rows)); } catch(_){}
      try { if (window.App && App.store && typeof App.store.set === 'function') App.store.set('branches', rows); } catch(_){}
      try { buildRegionBar(); } catch(_){}
      try { renderOpenings(); } catch(_){}
      try { renderGrid(); } catch(_){}
      try { renderClosed(); } catch(_){}
    }
    function switchTab(tabId) {

        if(selected) {
            selected.classList.remove('hidden');
            selected.classList.add('block');
        }
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('text-blue-400', 'border-blue-500');
            btn.classList.add('text-slate-400', 'border-transparent');

    // وظائف معالجة مرفقات الفروع
    async function handleBranchAttachmentUpload(input) {
        if (!input.files || !input.files.length) return;
        if (!__currentBranchId) {
           alert('لا يمكن رفع المرفق: لم يتم تحديد الفرع');
           return;
        }
        var file = input.files[0];
        
        // استخدام API الاحترافي لرفع المرفقات
        if (typeof APIClient !== 'undefined' && APIClient.fetch) {
            try {
                if(typeof toast === 'function') toast('info', 'جاري الرفع', 'يتم رفع الملف...');
                
                var formData = new FormData();
                formData.append('file', file);
                formData.append('cost_center', __currentBranchCostCenter || '');
                
                var response = await APIClient.fetch('/api/branches/' + __currentBranchId + '/attachments', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.success) {
                    if(typeof toast === 'function') toast('success', 'تم', 'تم رفع الملف بنجاح');
                    else alert('تم رفع الملف بنجاح');
                    renderBranchAttachmentsTab(__currentBranchName);
                    
                    // تحديث عدد المرفقات في البطاقة الرئيسية
                    updateAttachmentsCount(__currentBranchId, __currentBranchCostCenter);
                    
                    // إرسال إشعار فوري لجميع الصفحات المفتوحة بالتحديث
                    window.dispatchEvent(new CustomEvent('branchAttachmentsUpdated', { 
                        detail: { 
                            branchId: __currentBranchId, 
                            costCenter: __currentBranchCostCenter,
                            action: 'attachment_added',
                            timestamp: new Date().toISOString()
                        }
                    }));
                    
                    // محاولة تحديث صفحة الفروع إذا كانت مفتوحة
                    try {
                        if (window.parent && window.parent.renderGrid) {
                            window.parent.renderGrid();
                        } else if (window.renderGrid) {
                            window.renderGrid();
                        }
                    } catch(e) {
                        console.log('لم يتم العثور على دالة renderGrid في النافذة الحالية');
                    }
                } else {
                    if(typeof toast === 'function') toast('error', 'خطأ', response.message || 'فشل رفع الملف');
                    else alert('فشل رفع الملف: ' + (response.message || ''));
                }
                
            } catch(e) {
                console.error(e);
                if(typeof toast === 'function') toast('error', 'خطأ', 'فشل رفع الملف');
                else alert('فشل رفع الملف');
            }
        } else {
           alert('API Client غير متاح');
        }
        input.value = '';
    }
    
    // وظيفة تحديث عدد المرفقات في البطاقة الرئيسية
    async function updateAttachmentsCount(branchId, costCenter) {
        var countEl = document.getElementById('attachments-count-' + branchId);
        if (!countEl) return;
        var branches = getStoreList('branches');
        if (!branches.length) branches = safeParse('admin_branches_data', []);
        var branch = asArray(branches).find(function(b){
            var bid = String((b && (b.id || b.branch_id || b.code || '')) || '').trim();
            var bcc = String((b && (b.cost_center || b.costCenter || b.center || b.cc || '')) || '').trim();
            return (branchId && bid === String(branchId)) || (costCenter && bcc === String(costCenter));
        }) || null;
        updateAttachmentCount(branchId, countEl, branch);
    }

    function normalizeAttachment(att) {
        var filePath = att && (att.file_path || att.path || att.url || att.file_url || att.storage_path || '');
        var fileName = att && (att.file_name || att.name || att.original_name || att.title || '');
        if (!fileName && filePath) {
            var cleanedPath = String(filePath).split('?')[0].split('#')[0];
            var parts = cleanedPath.split('/');
            fileName = decodeURIComponent(parts[parts.length - 1] || '').trim();
        }
        return {
            id: att && (att.id || att.attachment_id || ''),
            file_path: filePath,
            path: filePath,
            file_name: fileName || 'ملف غير معروف',
            name: fileName || 'ملف غير معروف',
            mime_type: att && (att.mime_type || att.mime || att.file_type || ''),
            file_type: att && (att.file_type || att.mime_type || ''),
            size: Number(att && (att.size || att.file_size || 0)) || 0,
            created_at: att && (att.created_at || att.date || att.uploaded_at || ''),
            uploaded_by_name: att && (att.uploaded_by_name || att.uploaded_by || att.user_name || ''),
            cost_center: att && (att.cost_center || att.costCenter || att.center || ''),
            branch: att && (att.branch || att.branch_name || att.location || ''),
            attachable_id: att && (att.attachable_id || att.branch_id || att.branchId || '')
        };
    }

    function dedupeAttachments(rows) {
        var seen = {};
        var out = [];
        asArray(rows).forEach(function(att) {
            if (isAttachmentDeleted(att)) return;
            var n = normalizeAttachment(att || {});
            var key = String(n.id || '') + '|' + String(n.file_path || '') + '|' + String(n.file_name || '');
            if (!n.file_path && !n.file_name) return;
            if (seen[key]) return;
            seen[key] = true;
            out.push(n);
        });
        return out;
    }

    function matchesCurrentBranch(att, branchName) {
        var aid = String(att.attachable_id || att.branch_id || att.branchId || '').trim();
        var anm = String(att.branch || att.branch_name || att.location || '').trim();
        var acc = String(att.cost_center || att.costCenter || att.center || '').trim();
        if (__currentBranchId && aid && aid === String(__currentBranchId)) return true;
        if (__currentBranchCostCenter && acc && acc === String(__currentBranchCostCenter)) return true;
        var nm = String(__currentBranchName || branchName || '').trim();
        if (nm && anm && anm === nm) return true;
        return false;
    }

    function collectBranchEmbeddedAttachments(branchObj) {
        if (!branchObj || typeof branchObj !== 'object') return [];
        var out = [];
        var keys = ['attachments', 'branch_attachments', 'files', 'documents', 'contracts', 'branch_files'];
        keys.forEach(function(k) {
            if (Array.isArray(branchObj[k])) out = out.concat(branchObj[k]);
        });
        return out.filter(function(att){ return !isAttachmentDeleted(att); });
    }

    function collectLocalAttachmentSources(branchName) {
        var out = getAllLocalAttachmentRows();
        var nm = String(__currentBranchName || branchName || '').trim();
        return out.filter(function(att) {
            return !isAttachmentDeleted(att) && attachmentBelongsToBranch(att, __currentBranchId, __currentBranchCostCenter, nm);
        });
    }

    async function collectApiAttachments() {
        var out = [];
        if (!(typeof APIClient !== 'undefined' && APIClient.fetch)) return out;
        if (__currentBranchId) {
            try {
                var brRes = await APIClient.fetch('/api/branches/' + __currentBranchId + '/attachments');
                if (brRes && brRes.success && Array.isArray(brRes.data)) out = out.concat(brRes.data.filter(function(att){ return !isAttachmentDeleted(att); }));
            } catch(_){}
        } else if (__currentBranchCostCenter) {
            try {
                var ccRes = await APIClient.fetch('/api/attachments/by-cost-center/' + encodeURIComponent(__currentBranchCostCenter));
                if (ccRes && ccRes.success && Array.isArray(ccRes.data)) out = out.concat(ccRes.data.filter(function(att){ return !isAttachmentDeleted(att); }));
            } catch(_){}
        }
        return out;
    }

    function getCurrentBranchRecord(branchName) {
        var rows = getStoreList('branches');
        if (!rows.length) rows = safeParse('admin_branches_data', []);
        return asArray(rows).find(function(b){
            var bid = String((b && (b.id || b.branch_id || b.code || '')) || '').trim();
            var bcc = String((b && (b.cost_center || b.costCenter || b.center || '')) || '').trim();
            var bnm = String((b && (b.name || b.branch || b.branch_name || '')) || '').trim();
            return (__currentBranchId && bid && bid === String(__currentBranchId)) ||
                   (__currentBranchCostCenter && bcc && bcc === String(__currentBranchCostCenter)) ||
                   ((__currentBranchName || branchName) && bnm && bnm === String(__currentBranchName || branchName));
        }) || null;
    }

    function getAttachmentLabel(att, branchRec) {
        var labels = {
            unified_code: 'الكود الموحد',
            code_unified: 'الكود الموحد',
            brand_logo: 'شعار العلامة',
            logo: 'شعار العلامة',
            store_license: 'رخصة البلدية',
            civil_defense: 'الدفاع المدني',
            vertical_sign: 'لوحات عمودية',
            ad_permit: 'تصريح اعلاني',
            outdoor_permit: 'تصريح اعلاني',
            permit_24h: 'تصريح 24 ساعة',
            delivery_permit: 'تصريح التوصيل',
            outdoor_sessions: 'الجلسات الخارجية',
            electric_meter: 'عداد الكهرباء',
            water_meter: 'عداد المياه',
            clean_contract: 'عقد النظافة',
            lease_contract: 'عقد الإيجار'
        };
        var rawCategory = String((att && (att.category || att.cat || att.document_type || att.type || att.kind || att.tag || '')) || '').trim().toLowerCase();
        var fileName = String((att && (att.file_name || att.name || att.original_name || '')) || '').toLowerCase();
        var category = rawCategory;
        if (!category) {
            if (fileName.includes('unified') || fileName.includes('code') || fileName.includes('الكود الموحد')) category = 'unified_code';
            else if (fileName.includes('logo') || fileName.includes('brand') || fileName.includes('شعار')) category = 'brand_logo';
            else if (fileName.includes('vertical') || fileName.includes('عمودية')) category = 'vertical_sign';
            else if (fileName.includes('ad') || fileName.includes('advert') || fileName.includes('اعلان') || fileName.includes('تصريح اعلاني')) category = 'ad_permit';
            else if (fileName.includes('24') || fileName.includes('permit_24') || fileName.includes('24h') || fileName.includes('تصريح 24')) category = 'permit_24h';
            else if (fileName.includes('electric') || fileName.includes('kahraba') || fileName.includes('عداد الكهرباء')) category = 'electric_meter';
            else if (fileName.includes('water') || fileName.includes('عداد الماء') || fileName.includes('عداد المياه')) category = 'water_meter';
            else if (fileName.includes('municipal') || fileName.includes('store_license') || fileName.includes('rukhsa') || fileName.includes('رخصة البلدية')) category = 'store_license';
            else if (fileName.includes('civil') || fileName.includes('defense') || fileName.includes('الدفاع المدني')) category = 'civil_defense';
            else if (fileName.includes('clean') || fileName.includes('نظافة')) category = 'clean_contract';
            else if (fileName.includes('lease') || fileName.includes('إيجار')) category = 'lease_contract';
            else if (fileName.includes('delivery') || fileName.includes('توصيل')) category = 'delivery_permit';
            else if (fileName.includes('جلسات') || fileName.includes('outside seating') || fileName.includes('outdoor_session')) category = 'outdoor_sessions';
            else if (fileName.includes('outdoor') || fileName.includes('خارجي') || fileName.includes('لوحة')) category = 'ad_permit';
        }
        if (!category && branchRec && att) {
            var p = String(att.file_path || att.path || '').toLowerCase();
            var no = String(att.file_name || att.name || '').toLowerCase();
            if ((branchRec.store_license || branchRec.store_license_expiry) && (p.includes('store') || no.includes('store'))) category = 'store_license';
            else if ((branchRec.civil_defense || branchRec.civil_defense_expiry) && (p.includes('civil') || no.includes('civil'))) category = 'civil_defense';
            else if ((branchRec.permit_24h || branchRec.permit_24h_expiry) && (p.includes('24') || no.includes('24'))) category = 'permit_24h';
            else if ((branchRec.electric_meter_no || branchRec.electric_account_no) && (p.includes('electric') || no.includes('electric'))) category = 'electric_meter';
        }
        return labels[category] || 'مرفق الفرع';
    }

    function formatFileSize(bytes) {
        if (bytes === 0) return '0 بايت';
        var k = 1024;
        var sizes = ['بايت', 'كيلوبايت', 'ميجابايت', 'جيجابايت'];
        var i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function getFileIcon(mimeType) {
        if (mimeType.includes('pdf')) return '📄';
        if (mimeType.includes('word')) return '📝';
        if (mimeType.includes('excel') || mimeType.includes('spreadsheet')) return '📊';
        if (mimeType.includes('image')) return '🖼️';
        return '📎';
    }

    function previewAttachment(filePath, fileName, mimeType) {
        if (!filePath) {
            alert('مسار الملف غير متاح');
            return;
        }
        
        var fullPath = resolveAttachmentUrl(filePath);
        
        if (mimeType && mimeType.includes('image')) {
            // معاينة الصور في نافذة منبثقة
            var modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-slate-800 rounded-lg p-4 max-w-4xl max-h-[90vh] overflow-auto">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-white font-semibold">${fileName}</h3>
                        <button onclick="this.closest('.fixed').remove()" class="text-slate-400 hover:text-white">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                    <img src="${fullPath}" alt="${fileName}" class="max-w-full h-auto rounded">
                </div>
            `;
            document.body.appendChild(modal);
            modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
        } else if (mimeType && mimeType.includes('pdf')) {
            // معاينة PDF في نافذة جديدة
            window.open(fullPath, '_blank');
        } else {
            // تحميل الملفات الأخرى
            downloadAttachment(filePath, fileName);
        }
    }

    function downloadAttachment(filePath, fileName) {
        if (!filePath) {
            alert('مسار الملف غير متاح');
            return;
        }
        
        var fullPath = resolveAttachmentUrl(filePath);
        var link = document.createElement('a');
        link.href = fullPath;
        link.download = fileName || 'download';
        link.target = '_blank';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function printSingleAttachment(filePath, fileName, mimeType) {
        if (!filePath) {
            alert('مسار الملف غير متاح');
            return;
        }
        var fullPath = resolveAttachmentUrl(filePath);
        var kind = classifyPreviewType(fullPath, fileName, mimeType);
        if (kind === 'image' || kind === 'pdf') {
            var w = window.open(fullPath, '_blank');
            if (w) {
                try {
                    w.addEventListener('load', function(){ w.print(); });
                } catch(_){}
            }
            return;
        }
        var w2 = window.open('', '_blank');
        if (!w2) return;
        var html = `
            <!DOCTYPE html>
            <html dir="rtl" lang="ar">
            <head>
                <meta charset="UTF-8">
                <title>طباعة مرفق</title>
                <style>
                    body{font-family:Arial,sans-serif;padding:24px}
                    .box{border:1px solid #ddd;border-radius:8px;padding:16px}

                    .meta{color:#666}
                </style>
            </head>
            <body>
                <div class="box">
                    <div class="name">${fileName || 'مرفق'}</div>
                    <div class="meta">هذا النوع لا يدعم طباعة مباشرة داخل المتصفح.</div>
                    <div class="meta">يمكن فتح الملف ثم الطباعة من العارض.</div>
                    <div style="margin-top:12px"><a href="${fullPath}" target="_blank">فتح الملف</a></div>
                </div>
                <script>window.onload=function(){window.print();};<\/script>
            </body>
            </html>
        `;
        w2.document.write(html);
        w2.document.close();
    }

    function resolveAttachmentUrl(filePath) {
        if (!filePath) return '';
        var src = String(filePath || '').trim();
        if (!src) return '';
        if (src.startsWith('http://') || src.startsWith('https://') || src.startsWith('blob:') || src.startsWith('data:')) return src;
        if (src.startsWith('/storage/')) return src;
        if (src.startsWith('/attachments/')) return '/storage' + src;
        if (src.startsWith('attachments/')) return '/storage/' + src;
        if (src.startsWith('/')) return src;
        return '/storage/' + src.replace(/^\/+/, '');
    }

    function renderAttachmentDetails(details) {
        var rows = [];
        function pushRow(label, value, icon) {
            if (value == null) return;
            var v = String(value).trim();
            if (!v || v === 'غير معروف' || v === '0') return;
            rows.push(`
                <div class="bg-slate-900/55 border border-slate-700/45 rounded-md p-2">
                    <div class="text-[11px] text-slate-400 flex items-center gap-1 mb-1"><span>${icon || '•'}</span><span>${label}</span></div>
                    <div class="text-xs text-slate-100 break-words">${v}</div>
                </div>
            `);
        }
        pushRow('اسم الملف', details.file_name, '📎');
        pushRow('المسمى', details.label, '🏷️');
        pushRow('نوع الملف', details.file_type, '🧾');
        pushRow('الحجم', details.size ? formatFileSize(Number(details.size) || 0) : '', '📦');
        pushRow('تاريخ الرفع', details.upload_date, '🗓️');
        pushRow('رافع الملف', details.uploaded_by, '👤');
        pushRow('Cost Center', details.cost_center, '🏷️');
        pushRow('الفرع', details.branch, '🏢');
        pushRow('رقم المرفق', details.id, '🔢');
        if (!rows.length) return '';
        return '<div class="mt-3 rounded-md bg-slate-950/40 border border-slate-700/50 p-3"><div class="text-slate-200 text-xs font-semibold mb-2">تفاصيل المرفق</div><div class="grid grid-cols-1 md:grid-cols-2 gap-2">' + rows.join('') + '</div></div>';
    }

    function previewAttachmentInCard(btn, encodedPath, encodedName, encodedMime, encodedDetails) {
        var filePath = decodeURIComponent(encodedPath || '');
        var fileName = decodeURIComponent(encodedName || '');
        var mimeType = decodeURIComponent(encodedMime || '');
        var details = {};
        try { details = JSON.parse(decodeURIComponent(encodedDetails || '')) || {}; } catch(_) { details = {}; }
        var card = btn && btn.closest ? btn.closest('.attachment-card') : null;
        if (!card) return;
        var panel = card.querySelector('.attachment-inline-preview');
        if (!panel) return;
        var fullPath = resolveAttachmentUrl(filePath);
        if (!fullPath) {
            panel.classList.remove('hidden');
            panel.innerHTML = '<div class="text-xs text-amber-300 bg-amber-500/10 border border-amber-500/30 rounded p-3">لا يوجد مسار ملف لهذا المرفق</div>';
            return;
        }
        if (panel.dataset.path === fullPath && !panel.classList.contains('hidden')) {
            panel.classList.add('hidden');
            panel.innerHTML = '';
            panel.dataset.path = '';
            return;
        }
        var previewId = 'inline-preview-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
        panel.dataset.path = fullPath;
        panel.classList.remove('hidden');
        panel.innerHTML = `
            <div class="rounded-lg border border-slate-600/80 bg-slate-900 shadow-xl">
                <div class="flex items-center justify-between gap-2 p-3 border-b border-slate-600/70 bg-slate-800/70">
                    <div class="flex flex-col min-w-0">
                        <div class="text-[11px] text-indigo-300 truncate">${details && details.label ? details.label : 'مرفق الفرع'}</div>
                        <div class="text-sm text-slate-100 truncate">معاينة: ${fileName || 'ملف'}</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="adjustInlinePreviewZoom('${previewId}', -0.1)" class="px-2.5 py-1.5 text-xs bg-slate-700 hover:bg-slate-600 rounded text-white border border-slate-500">-</button>
                        <span id="${previewId}-label" class="text-xs text-slate-100 min-w-[48px] text-center font-semibold">100%</span>
                        <button onclick="adjustInlinePreviewZoom('${previewId}', 0.1)" class="px-2.5 py-1.5 text-xs bg-slate-700 hover:bg-slate-600 rounded text-white border border-slate-500">+</button>
                        <button onclick="resetInlinePreviewZoom('${previewId}')" class="px-2.5 py-1.5 text-xs bg-indigo-700 hover:bg-indigo-600 rounded text-white">إعادة</button>
                    </div>
                </div>
                <div class="p-2">
                    ${getInlinePreviewContent(fullPath, fileName, mimeType, previewId)}
                    ${renderAttachmentDetails(details)}
                </div>
            </div>
        `;
    }

    function inferExt(filePath, fileName) {
        var source = String(fileName || filePath || '').split('?')[0].split('#')[0];
        var parts = source.split('.');
        return parts.length > 1 ? String(parts.pop() || '').toLowerCase() : '';
    }

    function classifyPreviewType(filePath, fileName, mimeType) {
        var ext = inferExt(filePath, fileName);
        var mime = String(mimeType || '').toLowerCase();
        if (['jpg', 'jpeg', 'jbg', 'png', 'gif', 'webp', 'svg', 'bmp', 'ico', 'avif', 'heic'].includes(ext) || mime.indexOf('image/') === 0) return 'image';
        if (ext === 'pdf' || mime.indexOf('pdf') >= 0) return 'pdf';
        if (['txt', 'log', 'csv', 'json', 'xml', 'md', 'sql'].includes(ext) || mime.indexOf('text/') === 0 || mime.indexOf('json') >= 0 || mime.indexOf('xml') >= 0) return 'text';
        if (['mp4', 'webm', 'ogg', 'mov', 'm4v', 'avi', 'mkv'].includes(ext) || mime.indexOf('video/') === 0) return 'video';
        if (['mp3', 'wav', 'm4a', 'aac', 'oga'].includes(ext) || mime.indexOf('audio/') === 0) return 'audio';
        return 'other';
    }

    function loadTextPreview(targetId, filePath) {
        var target = document.getElementById(targetId);
        if (!target) return;
        fetch(filePath, { cache: 'no-store' })
            .then(function(res){ return res.text(); })
            .then(function(text){ if (target) target.textContent = text; })
            .catch(function(err){ if (target) target.textContent = 'فشل تحميل المحتوى: ' + (err && err.message ? err.message : err); });
    }

    function getInlinePreviewContent(filePath, fileName, mimeType, previewId) {
        var kind = classifyPreviewType(filePath, fileName, mimeType);
        if (kind === 'image') {
            return `<div class="overflow-auto max-h-[70vh] bg-slate-950/40 rounded p-2"><img id="${previewId}" src="${filePath}" alt="${fileName}" class="max-w-full h-auto mx-auto rounded origin-top transition-transform duration-150" style="transform:scale(1)" /></div>`;
        }
        if (kind === 'pdf') {
            return `<div class="overflow-auto max-h-[70vh] bg-slate-950/40 rounded p-2"><iframe id="${previewId}" src="${filePath}" class="w-full h-[65vh] rounded origin-top transition-transform duration-150" style="transform:scale(1); transform-origin:top center;"></iframe></div>`;
        }
        if (kind === 'video') {
            return `<div class="overflow-auto max-h-[70vh] bg-slate-950/40 rounded p-2"><video id="${previewId}" src="${filePath}" controls class="w-full max-h-[65vh] rounded origin-top transition-transform duration-150" style="transform:scale(1); transform-origin:top center;"></video></div>`;
        }
        if (kind === 'audio') {
            return `<div class="bg-slate-950/40 rounded p-4"><audio id="${previewId}" src="${filePath}" controls class="w-full"></audio></div>`;
        }
        if (kind === 'text') {
            var textId = previewId + '-text';
            setTimeout(function(){ loadTextPreview(textId, filePath); }, 0);
            return `<div class="bg-slate-950/40 rounded p-3 max-h-[70vh] overflow-auto"><pre id="${textId}" class="text-slate-200 text-xs whitespace-pre-wrap break-words">جاري تحميل النص...</pre></div>`;
        }
        return `<div class="text-center p-6">
                    <div class="text-3xl mb-2">📄</div>
                    <div class="text-slate-200 text-sm">${fileName || 'ملف'}</div>
                    <div class="text-slate-400 text-xs mt-1">لا تتوفر معاينة داخلية كاملة لهذا النوع في المتصفح</div>
                    <div class="flex justify-center gap-2 mt-3">
                        <button onclick="window.open('${filePath}','_blank')" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded">فتح</button>
                        <button onclick="downloadAttachment('${filePath}', '${fileName || 'download'}')" class="px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white text-xs rounded">تحميل</button>
                    </div>
                </div>`;
    }

    function adjustInlinePreviewZoom(previewId, delta) {
        var el = document.getElementById(previewId);
        if (!el) return;
        var current = parseFloat(el.dataset.scale || '1');
        var next = Math.max(0.5, Math.min(3, current + delta));
        el.dataset.scale = String(next);
        el.style.transform = 'scale(' + next + ')';
        var label = document.getElementById(previewId + '-label');
        if (label) label.textContent = Math.round(next * 100) + '%';
    }

    function resetInlinePreviewZoom(previewId) {
        var el = document.getElementById(previewId);
        if (!el) return;
        el.dataset.scale = '1';
        el.style.transform = 'scale(1)';
        var label = document.getElementById(previewId + '-label');
        if (label) label.textContent = '100%';
    }

    function previewAttachmentInline(filePath, fileName, mimeType) {
        if (!filePath) {
            alert('مسار الملف غير متاح');
            return;
        }
        filePath = resolveAttachmentUrl(filePath);
        
        // إنشاء modal للمعاينة
        var modalId = 'preview-modal-' + Date.now();

                <div class="flex justify-between items-center p-4 border-b border-slate-700">

                </div>
                <div class="p-4">
                    ${getPreviewContent(filePath, fileName, mimeType)}
                </div>
                <div class="flex gap-2 p-4 border-t border-slate-700">
                    <button onclick="downloadAttachment('${filePath}', '${fileName}')" 
                            class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded transition-colors">
                        تحميل
                    </button>
                    <button onclick="document.getElementById('${modalId}').remove()" 
                            class="px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded transition-colors">
                        إغلاق
                    </button>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
    }
    
    function previewBranchAttachments() {
        if (!__currentBranchId) {
            alert('يرجى اختيار فرع أولاً');
            return;
        }
        
        // جلب المرفقات الحالية
        var attachments = [];
        var container = document.getElementById('branch-attachments-container');
        
        // محاولة جلب المرفقات من العناصر الحالية في الحاوية
        var attachmentElements = container.querySelectorAll('[data-file-path], .attachment-item');
        attachmentElements.forEach(function(el) {
            var filePath = el.dataset.filePath || el.dataset.path || '';
            var fileName = el.dataset.fileName || el.dataset.name || '';
            var mimeType = el.dataset.mimeType || el.dataset.mime || '';
            
            if (filePath) {
                attachments.push({
                    file_path: filePath,
                    file_name: fileName,
                    mime_type: mimeType,
                    name: fileName
                });
            }
        });
        
        // إذا لم نجد مرفقات، نبحث في البيانات المحفوظة
        if (!attachments.length) {
            // جلب من Store
            if (typeof Store !== 'undefined') {
                var allAttachments = (Store.list ? Store.list('attachments') : []) || [];
                attachments = allAttachments.filter(function(att) {
                    return !isAttachmentDeleted(att) && (
                        String(att.attachable_id) === String(__currentBranchId) ||
                        String(att.costCenter || att.cost_center || '') === String(__currentBranchCostCenter)
                    );
                });
            }
        }
        
        if (!attachments.length) {
            alert('لا توجد مرفقات متاحة لهذا الفرع');
            return;
        }
        
        // إنشاء modal لعرض جميع المرفقات
        var modalId = 'branch-preview-modal-' + Date.now();
        var modal = document.createElement('div');
        modal.id = modalId;
        modal.className = 'fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50';
        
        var attachmentsHtml = attachments.map(function(att, index) {
            var fileName = att.file_name || att.name || 'ملف غير معروف';
            var fileType = getFileIcon(att.mime_type || att.file_type || '');
            var fileSize = formatFileSize(att.size || 0);
            var uploadDate = att.created_at ? new Date(att.created_at).toLocaleDateString('ar-SA') : 'غير معروف';
            
            return `
                <div class="bg-slate-800/60 p-4 rounded-lg border border-slate-700/50 mb-3">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="text-2xl">${fileType}</div>
                        <div class="flex-1">
                            <div class="text-white font-medium">${fileName}</div>
                            <div class="text-xs text-slate-400">الحجم: ${fileSize} | التاريخ: ${uploadDate}</div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="previewAttachmentInline('${att.file_path || att.path}', '${fileName}', '${att.mime_type || ''}')" 
                                class="flex-1 px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded transition-colors">
                            معاينة
                        </button>
                        <button onclick="downloadAttachment('${att.file_path || att.path}', '${fileName}')" 
                                class="flex-1 px-3 py-2 bg-green-600 hover:bg-green-700 text-white text-sm rounded transition-colors">
                            تحميل
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        
        modal.innerHTML = `
            <div class="bg-slate-900 rounded-lg max-w-4xl max-h-[90vh] overflow-auto m-4 w-full">
                <div class="flex justify-between items-center p-4 border-b border-slate-700">
                    <h3 class="text-white font-semibold">معاينة مرفقات الفرع - ${__currentBranchName || 'فرع غير معروف'}</h3>
                    <button onclick="document.getElementById('${modalId}').remove()" 
                            class="text-slate-400 hover:text-white text-2xl">
                        ×
                    </button>
                </div>
                <div class="p-4 overflow-y-auto max-h-[calc(90vh-120px)]">
                    ${attachmentsHtml}
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
    }

    function getPreviewContent(filePath, fileName, mimeType) {
        filePath = resolveAttachmentUrl(filePath);
        var kind = classifyPreviewType(filePath, fileName, mimeType);
        if (kind === 'image') {
            return `<img src="${filePath}" alt="${fileName}" class="max-w-full h-auto rounded" />`;
        }
        if (kind === 'pdf') {
            return `<iframe src="${filePath}" class="w-full h-96 border-0 rounded"></iframe>`;
        }
        if (kind === 'video') {
            return `<video src="${filePath}" controls class="w-full max-h-[70vh] rounded"></video>`;
        }
        if (kind === 'audio') {
            return `<audio src="${filePath}" controls class="w-full"></audio>`;
        }
        if (kind === 'text') {
            return `<div class="bg-slate-900 p-4 rounded max-h-96 overflow-auto">
                        <iframe src="${filePath}" class="w-full h-96 border-0 rounded bg-white"></iframe>
                    </div>`;
        }
        return `<div class="text-center p-8">
                    <div class="text-4xl mb-4">📄</div>
                    <div class="text-white font-medium">${fileName}</div>
                    <div class="text-slate-400 text-sm mt-2">لا تتوفر معاينة كاملة لهذا النوع داخل المتصفح</div>
                    <div class="flex items-center justify-center gap-2 mt-4">

                        <button onclick="downloadAttachment('${filePath}','${fileName || 'download'}')" class="px-3 py-2 bg-green-600 hover:bg-green-700 text-white rounded text-sm">تحميل</button>
                    </div>
                </div>`;
    }
