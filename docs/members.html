<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>إدارة الأعضاء | Olayan Dashboard</title>
  <link rel="stylesheet" href="style-base.css">
  <link rel="stylesheet" href="style-site.css">
  <link rel="stylesheet" href="style-admin.css">
  <style>
    .page-wrap { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .toolbar {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between;
      padding: 16px; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
      background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px);
      margin-bottom: 24px;
    }
    .toolbar .left, .toolbar .right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    
    .data-table { width: 100%; border-collapse: collapse; min-width: 800px; }
    .data-table th, .data-table td { padding: 12px 16px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .data-table th { color: #94a3b8; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .data-table td { color: #e2e8f0; font-size: 0.95rem; }
    .data-table tr:hover { background: rgba(255,255,255,0.02); }
    
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
    .badge-admin { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.2); }
    .badge-supervisor { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
    .badge-user { background: rgba(100, 116, 139, 0.15); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.2); }
    
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%; max-width: 700px; background: #1e293b; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; max-height: 90vh;
    }
    .modal-head { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { margin: 0; font-size: 1.25rem; color: #fff; }
    .modal-close { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1.5rem; padding: 0; line-height: 1; }
    .modal-body { padding: 24px; overflow-y: auto; }
    .modal-foot { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: flex-end; gap: 12px; }
    
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group.full { grid-column: 1 / -1; }
    .lbl { color: #94a3b8; font-size: 0.85rem; font-weight: 500; }
    .inp, .sel {
      background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; padding: 10px 14px; border-radius: 10px; width: 100%;
      font-family: inherit; transition: all 0.2s;
    }
    .inp:focus, .sel:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
    
    .multi-select-box {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
      max-height: 200px; overflow-y: auto; padding: 4px;
    }
    .multi-option {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px; cursor: pointer; transition: 0.2s; user-select: none;
    }
    .multi-option:hover { background: rgba(255,255,255,0.1); }
    .multi-option input { accent-color: #3b82f6; width: 16px; height: 16px; }
    
    .btn { padding: 10px 20px; border-radius: 10px; font-weight: 500; cursor: pointer; border: none; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .btn-danger { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }
    
    .empty-state { padding: 60px 20px; text-align: center; color: #64748b; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100">

  <div class="page-wrap">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <div>
        <h1 style="font-size:1.8rem; font-weight:700; margin:0;">إدارة الأعضاء</h1>
        <p style="color:#94a3b8; margin:4px 0 0 0; font-size:0.95rem;">إدارة المستخدمين وصلاحيات الوصول</p>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-secondary" onclick="setLang('ar')">AR</button>
        <button class="btn btn-secondary" onclick="setLang('en')">EN</button>
        <button class="btn btn-secondary" onclick="location.href='index.html'">العودة للرئيسية</button>
        <button class="btn btn-primary" onclick="openMemberModal()">+ عضو جديد</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="left">
        <input id="q" class="inp" placeholder="بحث بالاسم أو SAP ID..." style="width:250px" onkeyup="renderMembers()">
        <select id="roleFilter" class="sel" style="width:150px" onchange="renderMembers()">
          <option value="">كل الأدوار</option>
          <option value="admin">Admin</option>
          <option value="supervisor">Supervisor</option>
          <option value="user">User</option>
        </select>
      </div>
      <div class="right">
        <button class="btn btn-secondary" onclick="ensureMembersFromEmployees(); toast('success','تمت المزامنة','تم تحديث الأعضاء من قائمة الموظفين'); renderMembers();">
          🔄 مزامنة من الموظفين
        </button>
      </div>
    </div>

    <div style="overflow-x:auto; background:rgba(30,41,59,0.4); border-radius:16px; border:1px solid rgba(255,255,255,0.05);">
      <table class="data-table">
        <thead>
          <tr>
            <th>الاسم</th>
            <th>SAP ID</th>
            <th>Username</th>
            <th>الدور</th>
            <th>الصلاحيات (للمشرف)</th>
            <th>المصدر</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <!-- Member Modal -->
  <div class="modal-overlay" id="member-modal">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title" class="modal-title">إضافة عضو</h3>
        <button class="modal-close" onclick="closeMemberModal()">✕</button>
      </div>
      <div class="modal-body">
        <form id="member-form" onsubmit="event.preventDefault(); saveMember();">
          <input type="hidden" id="mem-id">
          <div class="form-grid">
            <div class="form-group">
              <label class="lbl">الاسم</label>
              <input id="mem-name" class="inp" required>
            </div>
            <div class="form-group">
              <label class="lbl">SAP ID</label>
              <input id="mem-sap" class="inp" placeholder="اختياري" oninput="autoFillUsername(this.value)">
            </div>
            <div class="form-group">
              <label class="lbl">اسم المستخدم (Username)</label>
              <input id="mem-user" class="inp" required>
            </div>
            <div class="form-group">
              <label class="lbl">الدور</label>
              <select id="mem-role" class="sel" onchange="toggleSupervisorScopes(this.value)">
                <option value="user">User</option>
                <option value="supervisor">Supervisor</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            
            <div id="supervisor-scopes" class="full" style="display:none; border-top:1px solid rgba(255,255,255,0.1); margin-top:10px; padding-top:15px;">
              <div class="form-group full">
                <label class="lbl">الفروع المسموحة</label>
                <div id="memBranchesBox" class="multi-select-box"></div>
                <div style="font-size:0.8rem; color:#94a3b8;">اختر الفروع التي يمكن للمشرف رؤيتها.</div>
              </div>
              <div class="form-group full" style="margin-top:15px;">
                <label class="lbl">مراكز التكلفة المسموحة (Cost Centers)</label>
                <div id="memCCBox" class="multi-select-box"></div>
                <div style="font-size:0.8rem; color:#94a3b8;">اختر مراكز التكلفة التي يمكن للمشرف رؤية موظفيها.</div>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" onclick="closeMemberModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveMember()">حفظ التغييرات</button>
      </div>
    </div>
  </div>

<script src="app.js"></script>
<script>
  // Initialize
  App.init('members');
  function setLang(lang){
    if (window.App && typeof App.setLang === 'function') App.setLang(lang);
    applyMembersTranslations();
  }
  function applyMembersTranslations(){
    const lang = (window.App && typeof App.getLang === 'function') ? App.getLang() : (localStorage.getItem('lang') || 'ar');
    const isAr = lang === 'ar';
    document.documentElement.lang = isAr ? 'ar' : 'en';
    document.documentElement.dir = isAr ? 'rtl' : 'ltr';
    document.body.setAttribute('dir', isAr ? 'rtl' : 'ltr');
    document.title = isAr ? 'إدارة الأعضاء | Olayan Dashboard' : 'Members Management | Olayan Dashboard';
    const map = [
      ['h1', 'إدارة الأعضاء', 'Members Management'],
      ['h1 + p', 'إدارة المستخدمين وصلاحيات الوصول', 'Manage users and access permissions'],
      ['button[onclick*="index.html"]', 'العودة للرئيسية', 'Back to Home'],
      ['button[onclick="openMemberModal()"]', '+ عضو جديد', '+ New Member'],
      ['#q', 'بحث بالاسم أو SAP ID...', 'Search by name or SAP ID...'],
      ['#roleFilter option[value=""]', 'كل الأدوار', 'All Roles'],
      ['button[onclick*="ensureMembersFromEmployees"]', '🔄 مزامنة من الموظفين', '🔄 Sync from Employees'],
      ['#modal-title', 'إضافة عضو', 'Add Member'],
      ['.modal-close', '✕', '✕'],
      ['.modal-foot .btn-secondary', 'إلغاء', 'Cancel'],
      ['.modal-foot .btn-primary', 'حفظ التغييرات', 'Save Changes']
    ];
    map.forEach(function(item){
      const el = document.querySelector(item[0]);
      if (!el) return;
      if (el.tagName === 'INPUT') el.setAttribute('placeholder', isAr ? item[1] : item[2]);
      else el.textContent = isAr ? item[1] : item[2];
    });
    const thAr = ['الاسم','SAP ID','Username','الدور','الصلاحيات (للمشرف)','المصدر','إجراءات'];
    const thEn = ['Name','SAP ID','Username','Role','Permissions (Supervisor)','Source','Actions'];
    document.querySelectorAll('thead th').forEach(function(th, i){
      if (i < thAr.length) th.textContent = isAr ? thAr[i] : thEn[i];
    });
    const labelsAr = ['الاسم','SAP ID','اسم المستخدم (Username)','الدور','الفروع المسموحة','مراكز التكلفة المسموحة (Cost Centers)'];
    const labelsEn = ['Name','SAP ID','Username','Role','Allowed Branches','Allowed Cost Centers'];
    document.querySelectorAll('.lbl').forEach(function(lb, i){
      if (i < labelsAr.length) lb.textContent = isAr ? labelsAr[i] : labelsEn[i];
    });
    const hints = document.querySelectorAll('#supervisor-scopes .form-group.full div[style*="font-size:0.8rem"]');
    if (hints[0]) hints[0].textContent = isAr ? 'اختر الفروع التي يمكن للمشرف رؤيتها.' : 'Choose branches visible to the supervisor.';
    if (hints[1]) hints[1].textContent = isAr ? 'اختر مراكز التكلفة التي يمكن للمشرف رؤية موظفيها.' : 'Choose cost centers visible to the supervisor.';
  }
  function mTr(ar, en){
    const lang = (window.App && typeof App.getLang === 'function') ? App.getLang() : (localStorage.getItem('lang') || 'ar');
    return lang === 'ar' ? ar : en;
  }
  document.addEventListener('app:lang', applyMembersTranslations);

  // --- Sync Logic (From User) ---
  function getEmployeesWithSap() { 
    const emps = getAllEmployeesAuto(); // Used global helper
    // If no employees found, return empty
    if(!emps || !emps.length) return [];
    
    // We try to find SAP ID in employee object directly
    return emps.map(e => { 
      const sapId = String(e.sapId || e.sap || e.employeeId || '').trim();
      return { ...e, sapId }; 
    }).filter(x => x.sapId && x.sapId.length > 3); // Simple validation
  } 

  function ensureMembersFromEmployees() { 
    const members = App.store.list('members') || []; 
    const byUsername = new Set(members.map(m => (m.username || '').toString().trim())); 

    const empList = getEmployeesWithSap(); 

    let addedCount = 0;
    empList.forEach(emp => { 
      const username = emp.sapId; // Username is SAP ID 
      if (byUsername.has(username)) return; 

      const role = 'user'; 
      const branch = String(emp.branch || emp.branchId || emp.branch_id || '').trim();
      const branches = branch ? [branch] : [];   // User sees their own branch only

      App.store.create('members', { 
        name: emp.name || emp.employeeName || emp.englishName || 'Employee ' + emp.sapId, 
        sapId: emp.sapId, 
        username, 
        password: emp.sapId,       // Temporary password = SAP ID
        role, 
        branches, 
        costCenters: [],
        source: 'from_employees' 
      }); 
      addedCount++;
    });
    
    if(addedCount > 0 && typeof toast === 'function') toast('success', 'Sync', mTr('تمت إضافة ', 'Added ') + addedCount + mTr(' عضو جديد', ' new members'));
  } 

  // --- Render Logic ---
  function renderMembers() {
    const rows = document.getElementById('rows');
    const q = document.getElementById('q').value.toLowerCase();
    const rFilter = document.getElementById('roleFilter').value;
    
    let list = App.store.list('members') || [];
    
    // Filter
    list = list.filter(m => {
      const matchQ = !q || (m.name||'').toLowerCase().includes(q) || (m.sapId||'').includes(q) || (m.username||'').toLowerCase().includes(q);
      const matchR = !rFilter || m.role === rFilter;
      return matchQ && matchR;
    });
    
    rows.innerHTML = '';
    if(!list.length) {
      rows.innerHTML = `<tr><td colspan="7" class="empty-state">لا توجد نتائج</td></tr>`;
      return;
    }
    
    list.forEach(m => {
      const tr = document.createElement('tr');
      
      // Badges
      let roleBadge = `<span class="badge badge-user">User</span>`;
      if(m.role === 'admin') roleBadge = `<span class="badge badge-admin">Admin</span>`;
      if(m.role === 'supervisor') roleBadge = `<span class="badge badge-supervisor">Supervisor</span>`;
      
      // Scope Summary
      let scopeTxt = '-';
      if(m.role === 'admin') scopeTxt = mTr('الكل', 'All');
      else if(m.role === 'supervisor') {
        const bCount = (m.branches||[]).length;
        const cCount = (m.costCenters||[]).length;
        scopeTxt = mTr(`${bCount} فروع / ${cCount} مراكز`, `${bCount} branches / ${cCount} cost centers`);
      }
      
      tr.innerHTML = `
        <td style="font-weight:600; color:#fff;">${m.name}</td>
        <td>${m.sapId || '-'}</td>
        <td>${m.username}</td>
        <td>${roleBadge}</td>
        <td>${scopeTxt}</td>
        <td>${m.source || 'manual'}</td>
        <td>
          <button class="btn btn-secondary" style="padding:6px 10px; font-size:0.8rem;" onclick="openMemberModal('${m.id}')">${mTr('تعديل', 'Edit')}</button>
          <button class="btn btn-danger" style="padding:6px 10px; font-size:0.8rem;" onclick="deleteMember('${m.id}')">${mTr('حذف', 'Delete')}</button>
        </td>
      `;
      rows.appendChild(tr);
    });
  }

  // --- Modal Logic ---
  let _editingId = null;

  function openMemberModal(id) {
    _editingId = id || null;
    const modal = document.getElementById('member-modal');
    const title = document.getElementById('modal-title');
    
    // Reset Form
    document.getElementById('member-form').reset();
    document.getElementById('memBranchesBox').innerHTML = '';
    document.getElementById('memCCBox').innerHTML = '';
    toggleSupervisorScopes('user'); // Reset view
    
    if(id) {
      title.textContent = mTr('تعديل عضو', 'Edit Member');
      const m = App.store.get('members', id);
      if(m) {
        document.getElementById('mem-id').value = m.id;
        document.getElementById('mem-name').value = m.name;
        document.getElementById('mem-sap').value = m.sapId || '';
        document.getElementById('mem-user').value = m.username;
        document.getElementById('mem-role').value = m.role || 'user';
        
        toggleSupervisorScopes(m.role);
        if(m.role === 'supervisor') {
          renderCheckboxes('memBranchesBox', getAllBranches(), m.branches || []);
          renderCheckboxes('memCCBox', getAllCostCenters(), m.costCenters || []);
        }
      }
    } else {
      title.textContent = mTr('إضافة عضو جديد', 'Add New Member');
      document.getElementById('mem-role').value = 'user';
      toggleSupervisorScopes('user');
    }
    
    modal.classList.add('open');
  }

  function closeMemberModal() {
    document.getElementById('member-modal').classList.remove('open');
  }
  
  function autoFillUsername(val) {
    if(!_editingId) { // Only if creating new
      document.getElementById('mem-user').value = val;
    }
  }

  function toggleSupervisorScopes(role) {
    const div = document.getElementById('supervisor-scopes');
    if(role === 'supervisor') {
      div.style.display = 'block';
      // If empty, render
      if(!document.getElementById('memBranchesBox').hasChildNodes()) {
         renderCheckboxes('memBranchesBox', getAllBranches(), []);
         renderCheckboxes('memCCBox', getAllCostCenters(), []);
      }
    } else {
      div.style.display = 'none';
    }
  }

  // --- Checkbox Helpers ---
  function getAllBranches() {
    // Try to get branches from localStorage key used in branches.html
    const BRANCHES_KEY = "ofs_branches_v1";
    try {
      const raw = localStorage.getItem(BRANCHES_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e){ return []; }
  }

  function renderCheckboxes(containerId, items, selected) {
    const box = document.getElementById(containerId);
    box.innerHTML = '';
    
    if(!items || !items.length) {
      box.innerHTML = '<div style="color:#64748b; font-size:0.85rem; padding:10px;">' + mTr('لا توجد بيانات متاحة.', 'No data available.') + '</div>';
      return;
    }
    
    const selectedSet = new Set((selected || []).map(String));
    
    items.forEach(item => {
      // Handle different object structures
      const val = String(item.id || item.code || item.branch_id || item).trim();
      const label = String(item.name || item.title || item.branch_name || item).trim();
      
      const div = document.createElement('label');
      div.className = 'multi-option';
      div.innerHTML = `
        <input type="checkbox" value="${val}" ${selectedSet.has(val) ? 'checked' : ''}>
        <span style="font-size:0.9rem;">${label}</span>
      `;
      box.appendChild(div);
    });
  }

  function getCheckedValues(containerId) {
    const box = document.getElementById(containerId);
    const checked = box.querySelectorAll('input:checked');
    return Array.from(checked).map(c => c.value);
  }

  // --- Save Logic ---
  function saveMember() {
    const id = _editingId;
    const name = document.getElementById('mem-name').value.trim();
    const sapId = document.getElementById('mem-sap').value.trim();
    const username = document.getElementById('mem-user').value.trim();
    const role = document.getElementById('mem-role').value;
    
    if(!name || !username) {
      toast('warning', mTr('بيانات ناقصة', 'Missing Data'), mTr('الاسم واسم المستخدم مطلوبان', 'Name and username are required'));
      return;
    }
    
    // Check duplicates
    const list = App.store.list('members') || [];
    const exists = list.find(m => m.username === username && m.id !== id);
    if(exists) {
      toast('warning', mTr('خطأ', 'Error'), mTr('اسم المستخدم موجود مسبقاً', 'Username already exists'));
      return;
    }

    let branches = [];
    let costCenters = [];
    
    if(role === 'admin') {
      branches = ['*'];
      costCenters = ['*'];
    } else if(role === 'supervisor') {
      branches = getCheckedValues('memBranchesBox');
      costCenters = getCheckedValues('memCCBox');
      
      if(!branches.length) {
        toast('warning', mTr('تنبيه', 'Notice'), mTr('يجب اختيار فرع واحد على الأقل للمشرف', 'Select at least one branch for supervisor'));
        return;
      }
      if(!costCenters.length) {
        toast('warning', mTr('تنبيه', 'Notice'), mTr('يجب اختيار مركز تكلفة واحد على الأقل للمشرف', 'Select at least one cost center for supervisor'));
        return;
      }
    } else {
      // User: Try to auto-assign from employee data if SAP match, else empty
      // Or keep existing if editing
      if(id) {
        const m = App.store.get('members', id);
        branches = m.branches || [];
        costCenters = m.costCenters || [];
      }
    }

    const data = {
      name, sapId, username, role, branches, costCenters,
      source: id ? (App.store.get('members', id).source) : 'manual'
    };
    
    // If new manual user, set password = username initially
    if(!id) data.password = username;

    if(id) {
      App.store.update('members', id, data);
      toast('success', mTr('تم الحفظ', 'Saved'), mTr('تم تحديث بيانات العضو', 'Member data updated'));
    } else {
      App.store.create('members', data);
      toast('success', mTr('تم الحفظ', 'Saved'), mTr('تم إضافة عضو جديد', 'New member added'));
    }
    
    closeMemberModal();
    renderMembers();
  }

  // --- Delete Logic ---
  function deleteMember(id) {
    confirmDialog({
      title: mTr('تأكيد الحذف', 'Confirm Deletion'),
      message: mTr('هل أنت متأكد من حذف هذا العضو؟ لا يمكن التراجع عن هذا الإجراء.', 'Are you sure you want to delete this member? This action cannot be undone.')
    }).then(ok => {
      if(ok) {
        App.store.remove('members', id);
        toast('success', mTr('تم الحذف', 'Deleted'), mTr('تم حذف العضو بنجاح', 'Member deleted successfully'));
        renderMembers();
      }
    });
  }

  // Initial Sync Check
  window.onload = function() {
    ensureMembersFromEmployees();
    applyMembersTranslations();
    renderMembers();
  };
</script>
</body>
</html>
