<svg xmlns="http://www.w3.org/2000/svg" width="180" height="64" viewBox="0 0 180 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="176" height="60" rx="12" fill="#0b1b2b" stroke="url(#bg)" stroke-width="2" filter="url(#glow)"/>
  <g transform="translate(14,18)" fill="#ffffff">
    <rect x="0" y="2" width="6" height="24" rx="3"/>
    <rect x="9" y="2" width="6" height="24" rx="3"/>
    <rect x="18" y="2" width="6" height="24" rx="3"/>
  </g>
  <text x="48" y="40" font-size="24" font-family="Segoe UI, Arial Black, sans-serif" fill="#ffffff" letter-spacing="2">OLAYAN</text>
</svg>
